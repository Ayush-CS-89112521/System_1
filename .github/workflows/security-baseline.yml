name: security-baseline

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  secret-scan:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-audit:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Node Audits
        shell: bash
        run: |
          set -euo pipefail
          node_projects=(
            "copilot-autopsy"
            "devflow/apps/agent"
            "devflow/apps/agent-host"
            "devflow/apps/web"
            "Obsidian Memory"
          )
          for project in "${node_projects[@]}"; do
            if [ -f "$project/package.json" ]; then
              echo "Running npm audit in $project"
              pushd "$project" >/dev/null
              npm install --package-lock-only --ignore-scripts
              npm audit --audit-level=high
              popd >/dev/null
            fi
          done

      - name: Python Dependency Check
        shell: bash
        run: |
          set -euo pipefail
          if [ -f "fixforward/pyproject.toml" ]; then
            python -m pip install --upgrade pip
            python -m pip install ./fixforward
            python -m pip check
          fi
